<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>В тему! — Статистика</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 24px;
            text-align: center;
            border-bottom: 2px solid #2a2a4a;
        }

        .header h1 {
            font-size: 28px;
            color: #fff;
            margin-bottom: 4px;
        }

        .header p {
            color: #8888aa;
            font-size: 14px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px;
        }

        .overview-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 16px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: #1a1a2e;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            border: 1px solid #2a2a4a;
            transition: transform 0.2s;
        }

        .stat-card:hover {
            transform: translateY(-2px);
            border-color: #4a4a6a;
        }

        .stat-card .value {
            font-size: 32px;
            font-weight: 700;
            color: #7c83ff;
            margin-bottom: 4px;
        }

        .stat-card .label {
            font-size: 13px;
            color: #8888aa;
        }

        .stat-card.highlight .value { color: #ffd700; }
        .stat-card.green .value { color: #4caf50; }
        .stat-card.orange .value { color: #ff9800; }
        .stat-card.pink .value { color: #e91e63; }

        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 24px;
            margin-bottom: 32px;
        }

        @media (max-width: 600px) {
            .charts-grid {
                grid-template-columns: 1fr;
            }
        }

        .chart-card {
            background: #1a1a2e;
            border-radius: 12px;
            padding: 24px;
            border: 1px solid #2a2a4a;
        }

        .chart-card h2 {
            font-size: 18px;
            margin-bottom: 16px;
            color: #ccc;
        }

        .chart-container {
            position: relative;
            height: 300px;
        }

        .loading {
            text-align: center;
            padding: 60px;
            color: #8888aa;
            font-size: 18px;
        }

        .loading .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 3px solid #2a2a4a;
            border-top-color: #7c83ff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error {
            text-align: center;
            padding: 40px;
            color: #e57373;
        }

        .back-link {
            display: inline-block;
            color: #7c83ff;
            text-decoration: none;
            margin-bottom: 16px;
            font-size: 14px;
        }

        .back-link:hover { text-decoration: underline; }

        .refresh-btn {
            background: #2a2a4a;
            color: #ccc;
            border: 1px solid #3a3a5a;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            float: right;
        }

        .refresh-btn:hover { background: #3a3a5a; }

        .section-title {
            font-size: 20px;
            color: #ccc;
            margin: 32px 0 16px;
            padding-bottom: 8px;
            border-bottom: 1px solid #2a2a4a;
        }

        .weekly-table {
            width: 100%;
            border-collapse: collapse;
            background: #1a1a2e;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #2a2a4a;
        }

        .weekly-table th, .weekly-table td {
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid #2a2a4a;
        }

        .weekly-table th {
            background: #16213e;
            color: #8888aa;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .weekly-table td { font-size: 14px; }
        .weekly-table tr:last-child td { border-bottom: none; }
    </style>
</head>
<body>

<div class="header">
    <h1>В тему! — Статистика</h1>
    <p>Аналитика и графики игры</p>
</div>

<div class="container">
    <a href="/" class="back-link">&larr; Назад к игре</a>
    <button class="refresh-btn" onclick="loadStats()">Обновить</button>

    <div id="content">
        <div class="loading">
            <div class="spinner"></div>
            <div>Загрузка статистики...</div>
        </div>
    </div>
</div>

<script src="stats.js"></script>

</body>
</html>
