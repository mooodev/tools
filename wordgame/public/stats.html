<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>В тему! — Статистика</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 24px;
            text-align: center;
            border-bottom: 2px solid #2a2a4a;
        }

        .header h1 {
            font-size: 28px;
            color: #fff;
            margin-bottom: 4px;
        }

        .header p {
            color: #8888aa;
            font-size: 14px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px;
        }

        .overview-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 16px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: #1a1a2e;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            border: 1px solid #2a2a4a;
            transition: transform 0.2s;
        }

        .stat-card:hover {
            transform: translateY(-2px);
            border-color: #4a4a6a;
        }

        .stat-card .value {
            font-size: 32px;
            font-weight: 700;
            color: #7c83ff;
            margin-bottom: 4px;
        }

        .stat-card .label {
            font-size: 13px;
            color: #8888aa;
        }

        .stat-card.highlight .value { color: #ffd700; }
        .stat-card.green .value { color: #4caf50; }
        .stat-card.orange .value { color: #ff9800; }
        .stat-card.pink .value { color: #e91e63; }

        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 24px;
            margin-bottom: 32px;
        }

        @media (max-width: 600px) {
            .charts-grid {
                grid-template-columns: 1fr;
            }
        }

        .chart-card {
            background: #1a1a2e;
            border-radius: 12px;
            padding: 24px;
            border: 1px solid #2a2a4a;
        }

        .chart-card h2 {
            font-size: 18px;
            margin-bottom: 16px;
            color: #ccc;
        }

        .chart-container {
            position: relative;
            height: 300px;
        }

        .loading {
            text-align: center;
            padding: 60px;
            color: #8888aa;
            font-size: 18px;
        }

        .loading .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 3px solid #2a2a4a;
            border-top-color: #7c83ff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error {
            text-align: center;
            padding: 40px;
            color: #e57373;
        }

        .back-link {
            display: inline-block;
            color: #7c83ff;
            text-decoration: none;
            margin-bottom: 16px;
            font-size: 14px;
        }

        .back-link:hover { text-decoration: underline; }

        .refresh-btn {
            background: #2a2a4a;
            color: #ccc;
            border: 1px solid #3a3a5a;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            float: right;
        }

        .refresh-btn:hover { background: #3a3a5a; }

        .section-title {
            font-size: 20px;
            color: #ccc;
            margin: 32px 0 16px;
            padding-bottom: 8px;
            border-bottom: 1px solid #2a2a4a;
        }

        .weekly-table {
            width: 100%;
            border-collapse: collapse;
            background: #1a1a2e;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #2a2a4a;
        }

        .weekly-table th, .weekly-table td {
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid #2a2a4a;
        }

        .weekly-table th {
            background: #16213e;
            color: #8888aa;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .weekly-table td { font-size: 14px; }
        .weekly-table tr:last-child td { border-bottom: none; }
    </style>
</head>
<body>

<div class="header">
    <h1>В тему! — Статистика</h1>
    <p>Аналитика и графики игры</p>
</div>

<div class="container">
    <a href="/" class="back-link">&larr; Назад к игре</a>
    <button class="refresh-btn" onclick="loadStats()">Обновить</button>

    <div id="content">
        <div class="loading">
            <div class="spinner"></div>
            <div>Загрузка статистики...</div>
        </div>
    </div>
</div>

<script>
const CHART_COLORS = {
    purple: '#7c83ff',
    gold: '#ffd700',
    green: '#4caf50',
    orange: '#ff9800',
    pink: '#e91e63',
    cyan: '#00bcd4',
    red: '#f44336',
    blue: '#2196f3',
};

const chartInstances = [];

function destroyCharts() {
    chartInstances.forEach(c => c.destroy());
    chartInstances.length = 0;
}

function formatNumber(n) {
    if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
    if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
    return String(n);
}

function formatTime(seconds) {
    const m = Math.floor(seconds / 60);
    const s = seconds % 60;
    return m > 0 ? `${m}м ${s}с` : `${s}с`;
}

async function loadStats() {
    const content = document.getElementById('content');
    content.innerHTML = '<div class="loading"><div class="spinner"></div><div>Загрузка статистики...</div></div>';
    destroyCharts();

    try {
        const res = await fetch('/api/stats');
        if (!res.ok) throw new Error('Ошибка загрузки');
        const data = await res.json();
        renderStats(data);
    } catch (e) {
        content.innerHTML = `<div class="error">Ошибка загрузки статистики: ${e.message}</div>`;
    }
}

function renderStats(data) {
    const { overview, levelDistribution, activityByDate, weeklySpeedStats } = data;
    const content = document.getElementById('content');

    content.innerHTML = `
        <div class="overview-grid">
            <div class="stat-card highlight">
                <div class="value">${formatNumber(overview.totalPlayers)}</div>
                <div class="label">Всего игроков</div>
            </div>
            <div class="stat-card green">
                <div class="value">${formatNumber(overview.activeToday)}</div>
                <div class="label">Активны сегодня</div>
            </div>
            <div class="stat-card">
                <div class="value">${formatNumber(overview.activeLast7Days)}</div>
                <div class="label">Активны за 7 дней</div>
            </div>
            <div class="stat-card">
                <div class="value">${formatNumber(overview.activeLast30Days)}</div>
                <div class="label">Активны за 30 дней</div>
            </div>
            <div class="stat-card orange">
                <div class="value">${formatNumber(overview.totalGames)}</div>
                <div class="label">Всего игр</div>
            </div>
            <div class="stat-card green">
                <div class="value">${formatNumber(overview.totalWins)}</div>
                <div class="label">Всего побед</div>
            </div>
            <div class="stat-card pink">
                <div class="value">${formatNumber(overview.totalPerfectGames)}</div>
                <div class="label">Идеальных игр</div>
            </div>
            <div class="stat-card">
                <div class="value">${formatNumber(overview.totalDuelWins)}</div>
                <div class="label">Побед в дуэлях</div>
            </div>
            <div class="stat-card highlight">
                <div class="value">${formatNumber(overview.totalStars)}</div>
                <div class="label">Всего звёзд</div>
            </div>
            <div class="stat-card orange">
                <div class="value">${overview.avgGamesPerPlayer}</div>
                <div class="label">Игр на игрока</div>
            </div>
            <div class="stat-card green">
                <div class="value">${overview.avgWinRate}%</div>
                <div class="label">Средний винрейт</div>
            </div>
            <div class="stat-card">
                <div class="value">${formatNumber(overview.totalCategories)}</div>
                <div class="label">Категорий найдено</div>
            </div>
        </div>

        <div class="charts-grid">
            <div class="chart-card">
                <h2>Активность по дням</h2>
                <div class="chart-container"><canvas id="activityChart"></canvas></div>
            </div>
            <div class="chart-card">
                <h2>Накопительный рост игроков</h2>
                <div class="chart-container"><canvas id="growthChart"></canvas></div>
            </div>
            <div class="chart-card">
                <h2>Распределение по уровням</h2>
                <div class="chart-container"><canvas id="levelChart"></canvas></div>
            </div>
            <div class="chart-card">
                <h2>Обзор игры</h2>
                <div class="chart-container"><canvas id="overviewChart"></canvas></div>
            </div>
        </div>

        <div id="weeklySection"></div>
    `;

    renderActivityChart(activityByDate);
    renderGrowthChart(activityByDate);
    renderLevelChart(levelDistribution);
    renderOverviewChart(overview);
    renderWeeklyTable(weeklySpeedStats);
}

function renderActivityChart(activityByDate) {
    const dates = Object.keys(activityByDate).sort();
    const last30 = dates.slice(-30);

    const ctx = document.getElementById('activityChart').getContext('2d');
    const chart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: last30.map(d => {
                const parts = d.split('-');
                return parts[2] + '.' + parts[1];
            }),
            datasets: [{
                label: 'Активных игроков',
                data: last30.map(d => activityByDate[d].active),
                backgroundColor: CHART_COLORS.purple + '99',
                borderColor: CHART_COLORS.purple,
                borderWidth: 1,
                borderRadius: 4
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { display: false }
            },
            scales: {
                x: {
                    ticks: { color: '#8888aa', maxRotation: 45 },
                    grid: { color: '#2a2a4a' }
                },
                y: {
                    beginAtZero: true,
                    ticks: { color: '#8888aa' },
                    grid: { color: '#2a2a4a' }
                }
            }
        }
    });
    chartInstances.push(chart);
}

function renderGrowthChart(activityByDate) {
    const dates = Object.keys(activityByDate).sort();

    // Cumulative player count by date
    let cumulative = 0;
    const cumulativeData = dates.map(d => {
        cumulative += activityByDate[d].active;
        return cumulative;
    });

    const ctx = document.getElementById('growthChart').getContext('2d');
    const chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: dates.map(d => {
                const parts = d.split('-');
                return parts[2] + '.' + parts[1];
            }),
            datasets: [{
                label: 'Общее кол-во игроков',
                data: cumulativeData,
                borderColor: CHART_COLORS.gold,
                backgroundColor: CHART_COLORS.gold + '20',
                fill: true,
                tension: 0.3,
                pointRadius: dates.length > 30 ? 0 : 3,
                borderWidth: 2
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { display: false }
            },
            scales: {
                x: {
                    ticks: { color: '#8888aa', maxTicksLimit: 15, maxRotation: 45 },
                    grid: { color: '#2a2a4a' }
                },
                y: {
                    beginAtZero: true,
                    ticks: { color: '#8888aa' },
                    grid: { color: '#2a2a4a' }
                }
            }
        }
    });
    chartInstances.push(chart);
}

function renderLevelChart(levelDistribution) {
    const levels = Object.keys(levelDistribution).map(Number).sort((a, b) => a - b);
    const counts = levels.map(l => levelDistribution[l]);

    // Generate gradient colors
    const colors = levels.map((_, i) => {
        const ratio = i / Math.max(levels.length - 1, 1);
        const r = Math.round(124 + ratio * (233 - 124));
        const g = Math.round(131 + ratio * (30 - 131));
        const b = Math.round(255 + ratio * (99 - 255));
        return `rgb(${r}, ${g}, ${b})`;
    });

    const ctx = document.getElementById('levelChart').getContext('2d');
    const chart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: levels.map(l => 'Ур. ' + l),
            datasets: [{
                label: 'Игроков',
                data: counts,
                backgroundColor: colors.map(c => c.replace('rgb', 'rgba').replace(')', ', 0.7)')),
                borderColor: colors,
                borderWidth: 1,
                borderRadius: 4
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { display: false }
            },
            scales: {
                x: {
                    ticks: { color: '#8888aa' },
                    grid: { color: '#2a2a4a' }
                },
                y: {
                    beginAtZero: true,
                    ticks: { color: '#8888aa' },
                    grid: { color: '#2a2a4a' }
                }
            }
        }
    });
    chartInstances.push(chart);
}

function renderOverviewChart(overview) {
    const ctx = document.getElementById('overviewChart').getContext('2d');
    const chart = new Chart(ctx, {
        type: 'doughnut',
        data: {
            labels: [
                'Обычные игры',
                'Идеальные игры',
                'Дуэли',
                'Ежедневные',
                'Еженедельные'
            ],
            datasets: [{
                data: [
                    Math.max(0, overview.totalWins - overview.totalPerfectGames - overview.totalDuelWins),
                    overview.totalPerfectGames,
                    overview.totalDuelWins,
                    overview.totalDailyPuzzles,
                    overview.totalWeeklyPuzzles
                ],
                backgroundColor: [
                    CHART_COLORS.purple + 'cc',
                    CHART_COLORS.green + 'cc',
                    CHART_COLORS.pink + 'cc',
                    CHART_COLORS.orange + 'cc',
                    CHART_COLORS.cyan + 'cc'
                ],
                borderColor: '#1a1a2e',
                borderWidth: 3
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: {
                    position: 'right',
                    labels: {
                        color: '#ccc',
                        padding: 16,
                        font: { size: 13 }
                    }
                }
            }
        }
    });
    chartInstances.push(chart);
}

function renderWeeklyTable(weeklySpeedStats) {
    const section = document.getElementById('weeklySection');
    const weeks = Object.keys(weeklySpeedStats).sort().reverse();

    if (weeks.length === 0) {
        section.innerHTML = '';
        return;
    }

    let rows = weeks.map(w => {
        const s = weeklySpeedStats[w];
        return `<tr>
            <td>${w}</td>
            <td>${s.participants}</td>
            <td>${formatTime(s.bestTime)}</td>
            <td>${formatTime(s.avgTime)}</td>
        </tr>`;
    }).join('');

    section.innerHTML = `
        <h2 class="section-title">Еженедельные соревнования на скорость</h2>
        <table class="weekly-table">
            <thead>
                <tr>
                    <th>Неделя</th>
                    <th>Участников</th>
                    <th>Лучшее время</th>
                    <th>Среднее время</th>
                </tr>
            </thead>
            <tbody>${rows}</tbody>
        </table>
    `;
}

// Load on page open
loadStats();
</script>

</body>
</html>
