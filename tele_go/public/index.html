<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#1a1410">
  <title>Tele Go</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <div id="app">
    <!-- Top bar -->
    <header id="header">
      <div class="header-left">
        <div class="player-info" id="player-black">
          <span class="stone-icon black"></span>
          <span class="player-name" id="black-name">Black</span>
          <span class="capture-count" id="black-captures">0</span>
        </div>
      </div>
      <div class="header-center">
        <div id="game-status" class="status-badge">Waiting...</div>
        <div id="move-counter" class="move-count"></div>
      </div>
      <div class="header-right">
        <div class="player-info" id="player-white">
          <span class="capture-count" id="white-captures">0</span>
          <span class="player-name" id="white-name">White</span>
          <span class="stone-icon white"></span>
        </div>
      </div>
    </header>

    <!-- Board container -->
    <div id="board-wrap">
      <canvas id="board-canvas"></canvas>
      <div id="touch-feedback"></div>
    </div>

    <!-- Bottom controls -->
    <footer id="controls">
      <div class="control-row primary-controls">
        <button id="btn-pass" class="ctrl-btn" title="Pass">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
          <span>Pass</span>
        </button>
        <button id="btn-ai" class="ctrl-btn hint-btn" title="AI Hint">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/>
            <circle cx="12" cy="17" r="0.5" fill="currentColor"/>
          </svg>
          <span>Hint</span>
        </button>
        <button id="btn-resign" class="ctrl-btn danger-btn" title="Resign">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 4l16 16M4 20L20 4"/>
          </svg>
          <span>Resign</span>
        </button>
      </div>
      <div class="control-row secondary-controls">
        <button id="btn-invite" class="ctrl-btn small" title="Invite">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="8.5" cy="7" r="4"/>
            <line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/>
          </svg>
          <span>Invite</span>
        </button>
        <button id="btn-analyze" class="ctrl-btn small disabled-feature" title="Analyze (coming soon)" style="display:none">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12h-4l-3 9L9 3l-3 9H2"/>
          </svg>
          <span>Analyze</span>
        </button>
        <button id="btn-sound" class="ctrl-btn small" title="Sound">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/>
          </svg>
          <span>Sound</span>
        </button>
      </div>
    </footer>

    <!-- AI suggestion overlay -->
    <div id="ai-overlay" class="overlay" style="display:none">
      <div class="overlay-content">
        <h3>AI Suggestion</h3>
        <div id="ai-info"></div>
        <div class="overlay-actions">
          <button id="ai-play-btn" class="action-btn primary">Play This Move</button>
          <button id="ai-close-btn" class="action-btn">Dismiss</button>
        </div>
      </div>
    </div>

    <!-- Analysis overlay -->
    <div id="analysis-overlay" class="overlay" style="display:none">
      <div class="overlay-content analysis-panel">
        <h3>Game Analysis</h3>
        <div id="analysis-loading" class="loading-spinner">Analyzing...</div>
        <div id="analysis-content" style="display:none">
          <div id="analysis-summary"></div>
          <canvas id="score-chart" height="120"></canvas>
          <div id="analysis-moves"></div>
          <div id="analysis-mistakes"></div>
        </div>
        <button id="analysis-close" class="action-btn">Close</button>
      </div>
    </div>

    <!-- Game over overlay -->
    <div id="gameover-overlay" class="overlay" style="display:none">
      <div class="overlay-content gameover-panel">
        <div id="gameover-icon"></div>
        <h2 id="gameover-title"></h2>
        <p id="gameover-detail"></p>
        <div class="overlay-actions">
          <button id="gameover-analyze" class="action-btn disabled-feature" disabled>Analyze Game</button>
          <button id="gameover-newgame" class="action-btn primary">New Game</button>
        </div>
      </div>
    </div>

    <!-- Invite modal -->
    <div id="invite-overlay" class="overlay" style="display:none">
      <div class="overlay-content">
        <h3>Invite to Game</h3>
        <p>Share this link with a friend:</p>
        <div class="invite-link-box">
          <input id="invite-link" type="text" readonly>
          <button id="copy-link" class="action-btn small">Copy</button>
        </div>
        <div class="overlay-actions">
          <button id="invite-telegram" class="action-btn primary">Send via Telegram</button>
          <button id="invite-close" class="action-btn">Close</button>
        </div>
      </div>
    </div>

    <!-- Waiting for opponent -->
    <div id="waiting-overlay" class="overlay" style="display:none">
      <div class="overlay-content">
        <div class="waiting-animation">
          <span class="stone-icon black pulse"></span>
          <span class="waiting-dots">...</span>
          <span class="stone-icon white dim"></span>
        </div>
        <h3>Waiting for opponent</h3>
        <p>Share the invite link to start playing</p>
        <div class="overlay-actions">
          <button id="waiting-invite" class="action-btn primary">Invite Friend</button>
        </div>
      </div>
    </div>

    <!-- Confirm dialog -->
    <div id="confirm-overlay" class="overlay" style="display:none">
      <div class="overlay-content">
        <h3 id="confirm-title"></h3>
        <p id="confirm-message"></p>
        <div class="overlay-actions">
          <button id="confirm-yes" class="action-btn danger">Confirm</button>
          <button id="confirm-no" class="action-btn">Cancel</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/haptics.js"></script>
  <script src="/js/sounds.js"></script>
  <script src="/js/board.js"></script>
  <script src="/js/analysis.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
